<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Juice Menu | Admin Panel</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="assets/css/juice-menu.css">

<link rel="stylesheet" href="assets/css/admin-dark-mode.css">

</head>
<body>

<div>

</div>

</div>

<div class="table-responsive">

<tbody>

<i class="bi bi-pencil"></i>
</button>

<button class="btn btn-danger btn-sm">
<i class="bi bi-trash"></i>

</td>

</tr>

<tr>

<td>Orange Juice</td>

<button class="btn btn-primary btn-sm">
<i class="bi bi-eye"></i>
</button>

<button class="btn btn-warning btn-sm">
<i class="bi bi-pencil"></i>
</button>

<button class="btn btn-danger btn-sm">
<i class="bi bi-trash"></i>
</button>

</td>

</tr>

<tr>

<td>#J003</td>

<!-- <td><img src="assets/images/watermelon.jpg" width="60"></td> -->

<td>Watermelon Juice</td>

<td>Summer</td>

<td>$7.00</td>

<td><span class="badge bg-danger">Out of Stock</span></td>

<td>

<button class="btn btn-primary btn-sm">
<i class="bi bi-eye"></i>
</button>

<button class="btn btn-warning btn-sm">
<i class="bi bi-pencil"></i>
</button>

<button class="btn btn-danger btn-sm">
<i class="bi bi-trash"></i>
</button>

</td>

</tr>

<tr>

<td>#J004</td>

<!-- <td><img src="assets/images/pineapple.jpg" width="60"></td> -->

<td>Pineapple Juice</td>

<td>Tropical</td>

<td>$6.00</td>

<td><span class="badge bg-success">Available</span></td>

<td>

<button class="btn btn-primary btn-sm">
<i class="bi bi-eye"></i>
</button>

<button class="btn btn-warning btn-sm">

</table>

</div>

</div>

</div>

<!-- Add Juice Modal -->
<div class="modal fade" id="addJuiceModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form id="addJuiceForm">
                <div class="modal-header">
                    <h5 class="modal-title">Add Juice</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Juice Name</label>
                        <input type="text" class="form-control" id="newJuiceName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <select class="form-select" id="newJuiceCategory" required>
                            <option value="" selected disabled>Choose a category</option>
                            <option value="Citrus">Citrus</option>
                            <option value="Tropical">Tropical</option>
                            <option value="Summer">Summer</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Price ($)</label>
                        <input type="number" step="0.01" min="0" class="form-control" id="newJuicePrice" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Status</label>
                        <select class="form-select" id="newJuiceStatus" required>
                            <option value="Available" selected>Available</option>
                            <option value="Out of Stock">Out of Stock</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-success">Add Juice</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/admin-theme.js"></script>
<script src="js/admin-actions.js"></script>
<script>
(function () {
    var searchInput = document.getElementById("juiceSearchInput");
    var categoryFilter = document.getElementById("juiceCategoryFilter");
    var tbody = document.querySelector("#juiceTable tbody");

    function applyFilters() {
        var query = searchInput.value.trim().toLowerCase();
        var category = categoryFilter.value;
        var rows = tbody.querySelectorAll("tr");

        rows.forEach(function (row) {
            var cells = row.querySelectorAll("td");
            var name = cells[1] ? cells[1].textContent.trim().toLowerCase() : "";
            var rowCategory = cells[2] ? cells[2].textContent.trim().toLowerCase() : "";

            var matchesSearch = !query || name.includes(query);
            var matchesCategory = category === "all" || rowCategory === category;

            row.style.display = matchesSearch && matchesCategory ? "" : "none";
        });
    }

    searchInput.addEventListener("input", applyFilters);
    categoryFilter.addEventListener("change", applyFilters);

    /* ---- Add Juice ---- */
    var addForm = document.getElementById("addJuiceForm");
    var addModalEl = document.getElementById("addJuiceModal");
    var addModal = new bootstrap.Modal(addModalEl);

    function nextId() {
        var rows = tbody.querySelectorAll("tr");
        var max = 0;
        rows.forEach(function (row) {
            var idText = row.querySelector("td") ? row.querySelector("td").textContent.trim() : "";
            var num = parseInt(idText.replace(/\D/g, ""), 10);
            if (!isNaN(num) && num > max) max = num;
        });
        return "#J" + String(max + 1).padStart(3, "0");
    }

    function badgeClass(status) {
        return status === "Available" ? "badge bg-success" : "badge bg-danger";
    }

    addForm.addEventListener("submit", function (e) {
        e.preventDefault();

        if (!addForm.checkValidity()) {
            addForm.reportValidity();
            return;
        }

        var name = document.getElementById("newJuiceName").value.trim();
        var category = document.getElementById("newJuiceCategory").value;
        var price = parseFloat(document.getElementById("newJuicePrice").value);
        var status = document.getElementById("newJuiceStatus").value;

        var row = document.createElement("tr");
        row.innerHTML =
            "<td>" + nextId() + "</td>" +
            "<td>" + name + "</td>" +
            "<td>" + category + "</td>" +
            "<td>$" + price.toFixed(2) + "</td>" +
            "<td><span class=\"" + badgeClass(status) + "\">" + status + "</span></td>" +
            "<td>" +
            "<button class=\"btn btn-primary btn-sm\"><i class=\"bi bi-eye\"></i></button> " +
            "<button class=\"btn btn-warning btn-sm\"><i class=\"bi bi-pencil\"></i></button> " +
            "<button class=\"btn btn-danger btn-sm\"><i class=\"bi bi-trash\"></i></button>" +
            "</td>";

        tbody.appendChild(row);
        applyFilters();

        addForm.reset();
        addModal.hide();
    });
})();
</script>

</body>
</html>
